name: 每日天氣推播

on:
  schedule:
    # 每天 UTC 22:00 = 台灣時間 06:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允許手動觸發測試

jobs:
  push-weather:
    runs-on: ubuntu-latest
    steps:
      - name: 推播天氣給訂閱者
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://line-bot-secretary.onrender.com/cron/weather?secret=${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP 狀態碼: $HTTP_CODE"
          echo "回應內容: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 推播失敗！HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ 推播成功"
